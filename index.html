<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alexia — Dua Criativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --text: #1a1916;
    --muted: #7a7870;
    --accent: #1a1916;
    --urgent: #c0392b;
    --urgent-bg: #fdf2f1;
    --high: #b7660a;
    --high-bg: #fef7ed;
    --normal: #1a5c8a;
    --normal-bg: #eef5fb;
    --new: #1a7a4a;
    --new-bg: #edf7f2;
    --designer-color: #6b4fbb;
    --designer-bg: #f0edfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text);
    text-decoration: none;
  }
  .logo span { color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .designer-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--designer-bg);
    border: 1px solid #c5b8f0;
    border-radius: 20px;
    padding: 4px 12px 4px 6px;
  }
  .designer-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--designer-color);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: #fff;
  }
  .designer-badge span { font-size: 13px; font-weight: 500; color: var(--designer-color); }

  .week-nav {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
  }
  .week-nav button {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--muted);
    transition: background 0.15s;
  }
  .week-nav button:hover { background: var(--surface2); }
  .week-label { font-size: 13px; color: var(--text); font-weight: 500; min-width: 160px; text-align: center; }

  .sync-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer;
    color: var(--text);
    transition: background 0.15s;
  }
  .sync-btn:hover { background: var(--surface2); }
  .sync-btn.loading { opacity: 0.5; pointer-events: none; }

  .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

  .stats-row {
    display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    display: flex; flex-direction: column; gap: 2px;
    min-width: 120px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-size: 24px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; }
  .stat-value.u { color: var(--urgent); }
  .stat-value.h { color: var(--high); }
  .stat-value.n { color: var(--new); }

  .error-bar {
    background: var(--urgent-bg); border: 1px solid #f5c0bb;
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; color: var(--urgent);
    margin-bottom: 1rem; display: none;
  }

  /* Setup panel */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    max-width: 480px;
    margin: 3rem auto;
  }
  .setup-panel h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .setup-panel p { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
  .setup-panel label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .setup-panel input {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px; font-family: 'DM Mono', monospace;
    font-size: 13px; background: var(--bg);
    color: var(--text); margin-bottom: 1rem; outline: none;
  }
  .setup-panel input:focus { border-color: var(--designer-color); }
  .setup-panel button {
    width: 100%; padding: 10px;
    background: var(--text); color: #fff;
    border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
  }
  .setup-panel button:hover { opacity: 0.85; }

  /* Calendar */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .day-col.today { border-color: var(--designer-color); }
  .day-header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .day-col.today .day-header { background: var(--designer-bg); }
  .day-name {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); font-weight: 500;
  }
  .day-col.today .day-name { color: var(--designer-color); }
  .day-date {
    font-size: 20px; font-weight: 300; color: var(--text);
    font-family: 'DM Mono', monospace; margin-top: 2px;
  }
  .day-col.today .day-date { color: var(--designer-color); font-weight: 500; }
  .day-count {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }
  .day-tasks { padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 60px; }

  .task-card {
    border-radius: 7px;
    border-left: 3px solid transparent;
    padding: 8px 9px;
    font-size: 12px;
    line-height: 1.5;
    position: relative;
    cursor: pointer;
    transition: opacity 0.15s;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
  }
  .task-card:hover { opacity: 0.8; }
  .task-card.urgent { border-left-color: var(--urgent); background: var(--urgent-bg); }
  .task-card.high { border-left-color: var(--high); background: var(--high-bg); }
  .task-card.normal { border-left-color: var(--normal); background: var(--normal-bg); }

  .task-name { font-weight: 500; color: var(--text); margin-bottom: 3px; word-break: break-word; }
  .task-parent { font-size: 11px; color: var(--muted); }
  .task-pills { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
  .pill {
    font-size: 10px; padding: 1px 6px; border-radius: 10px;
    font-weight: 500; white-space: nowrap;
  }
  .pill.urgent { background: #fde0dd; color: var(--urgent); }
  .pill.high { background: #fde8c8; color: var(--high); }
  .pill.normal { background: #d8eaf8; color: var(--normal); }
  .pill.new { background: var(--new-bg); color: var(--new); }

  .empty-day {
    font-size: 12px; color: var(--muted);
    padding: 8px 4px; font-style: italic;
  }

  /* No-date section */
  .nodate-section {
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .nodate-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .nodate-header h3 { font-size: 13px; font-weight: 500; color: var(--muted); }
  .nodate-tasks { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,25,22,0.5);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 1.5rem;
    width: 380px;
    max-width: 90vw;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem; }
  .modal-title { font-size: 15px; font-weight: 500; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--muted); }
  .modal-row { margin-bottom: 10px; }
  .modal-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .modal-val { font-size: 14px; color: var(--text); }
  .modal-link {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 1rem; font-size: 13px;
    color: var(--designer-color); text-decoration: none;
    border: 1px solid #c5b8f0; border-radius: 6px;
    padding: 6px 12px;
  }

  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    text-align: center; padding: 2rem;
    font-size: 12px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="https://duacriativa.github.io/dashboarddua/">DUA<span>*.*</span></a>
  <div class="header-right">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹</button>
      <div class="week-label" id="week-label">—</div>
      <button onclick="changeWeek(1)">›</button>
    </div>
    <div class="designer-badge">
      <div class="designer-avatar">AL</div>
      <span>Alexia</span>
    </div>
    <button class="sync-btn" id="sync-btn" onclick="syncData()">
      <span id="sync-icon">↻</span> Atualizar
    </button>
  </div>
</header>

<div class="main" id="main-content">

  <div id="dashboard-area" style="display:none">
    <div class="error-bar" id="error-bar"></div>

    <div class="stats-row">
      <div class="stat"><div class="stat-label">Esta semana</div><div class="stat-value" id="st-total">—</div></div>
      <div class="stat"><div class="stat-label">Urgentes</div><div class="stat-value u" id="st-urgent">—</div></div>
      <div class="stat"><div class="stat-label">Alta</div><div class="stat-value h" id="st-high">—</div></div>
      <div class="stat"><div class="stat-label">Novas hoje</div><div class="stat-value n" id="st-new">—</div></div>
      <div class="stat"><div class="stat-label">Sem data</div><div class="stat-value" id="st-nodate">—</div></div>
    </div>

    <div class="calendar-grid" id="calendar"></div>

    <div class="nodate-section" id="nodate-section" style="display:none">
      <div class="nodate-header" onclick="toggleNodate()">
        <h3>Sem data definida</h3>
        <span id="nodate-chev" style="font-size:12px;color:var(--muted)">▼</span>
      </div>
      <div class="nodate-tasks" id="nodate-tasks"></div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-row"><div class="modal-label">Tarefa mãe</div><div class="modal-val" id="modal-parent">—</div></div>
    <div class="modal-row"><div class="modal-label">Lista</div><div class="modal-val" id="modal-list">—</div></div>
    <div class="modal-row"><div class="modal-label">Status</div><div class="modal-val" id="modal-status">—</div></div>
    <div class="modal-row"><div class="modal-label">Prazo</div><div class="modal-val" id="modal-due">—</div></div>
    <div class="modal-row"><div class="modal-label">Prioridade</div><div class="modal-val" id="modal-prio">—</div></div>
    <a class="modal-link" id="modal-link" href="#" target="_blank">Abrir no ClickUp ↗</a>
  </div>
</div>

<footer>Dua Criativa © 2026 — Alexia · Seg → Sex</footer>

<script>
const DESIGNER_NAME = 'alexia';
const TOKEN = 'pk_112051795_7JMUFX4WPPB8NRTLD58X4TH2QPJW1DY0';
const TEAM_ID = '9013166822';

let allTasks = [];
let weekOffset = 0;
let nodateOpen = true;

function getWeekDays(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff + offset * 7);
  monday.setHours(0,0,0,0);
  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

function getWeekLabel(days) {
  const fmt = d => d.toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
  return `${fmt(days[0])} → ${fmt(days[4])}`;
}

function getPrio(ms) {
  if (!ms) return 'no-date';
  const today = new Date(); today.setHours(0,0,0,0);
  const tom = new Date(today); tom.setDate(today.getDate()+1);
  const d3 = new Date(today); d3.setDate(today.getDate()+3);
  const due = new Date(parseInt(ms)); due.setHours(0,0,0,0);
  if (due <= tom) return 'urgent';
  if (due <= d3) return 'high';
  return 'normal';
}

function prioLabel(p) {
  return {urgent:'Urgente', high:'Alta', normal:'Normal', 'no-date':'Sem prazo'}[p]||'';
}

function fmtDate(ms) {
  if (!ms) return null;
  return new Date(parseInt(ms)).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}

function isNew(ms) {
  if (!ms) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const c = new Date(parseInt(ms)); c.setHours(0,0,0,0);
  return c.getTime() === today.getTime();
}

function isToday(d) {
  const now = new Date();
  return d.getDate()===now.getDate() && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
}

function sameDay(dateMs, day) {
  const d = new Date(parseInt(dateMs)); d.setHours(0,0,0,0);
  const c = new Date(day); c.setHours(0,0,0,0);
  return d.getTime() === c.getTime();
}

function changeWeek(dir) {
  weekOffset += dir;
  render();
}

function toggleNodate() {
  nodateOpen = !nodateOpen;
  document.getElementById('nodate-tasks').style.display = nodateOpen ? '' : 'none';
  document.getElementById('nodate-chev').textContent = nodateOpen ? '▼' : '▶';
}

function openModal(task) {
  document.getElementById('modal-title').textContent = task.name;
  document.getElementById('modal-parent').textContent = task.parentName || '—';
  document.getElementById('modal-list').textContent = task.list || '—';
  document.getElementById('modal-status').textContent = task.status || '—';
  document.getElementById('modal-due').textContent = fmtDate(task.due_date) || 'Sem data';
  document.getElementById('modal-prio').textContent = prioLabel(getPrio(task.due_date ? parseInt(task.due_date) : null));
  document.getElementById('modal-link').href = task.url || '#';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

function buildTaskCard(task) {
  const p = getPrio(task.due_date ? parseInt(task.due_date) : null);
  const newToday = isNew(task.date_created);
  const div = document.createElement('div');
  div.className = `task-card ${p}`;
  div.innerHTML = `
    <div class="task-name">${task.name}</div>
    ${task.parentName ? `<div class="task-parent">↳ ${task.parentName}</div>` : ''}
    <div class="task-pills">
      <span class="pill ${p}">${prioLabel(p)}</span>
      ${newToday ? '<span class="pill new">nova hoje</span>' : ''}
    </div>`;
  div.onclick = () => openModal(task);
  return div;
}

function render() {
  const days = getWeekDays(weekOffset);
  document.getElementById('week-label').textContent = getWeekLabel(days);

  const dayNames = ['seg','ter','qua','qui','sex'];
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  let totalWeek = 0, urgent = 0, high = 0, newT = 0;
  const nodate = allTasks.filter(t => !t.due_date);

  for (let i = 0; i < 5; i++) {
    const day = days[i];
    const dayTasks = allTasks.filter(t => t.due_date && sameDay(t.due_date, day));
    totalWeek += dayTasks.length;
    for (const t of dayTasks) {
      const p = getPrio(parseInt(t.due_date));
      if (p==='urgent') urgent++;
      if (p==='high') high++;
      if (isNew(t.date_created)) newT++;
    }

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday(day) ? ' today' : '');
    col.innerHTML = `<div class="day-header">
      <div class="day-name">${dayNames[i]}</div>
      <div class="day-date">${day.getDate()}</div>
      <div class="day-count">${dayTasks.length} tarefa${dayTasks.length!==1?'s':''}</div>
    </div>
    <div class="day-tasks" id="day-${i}"></div>`;
    cal.appendChild(col);

    const tasksEl = col.querySelector(`#day-${i}`);
    if (!dayTasks.length) {
      tasksEl.innerHTML = '<div class="empty-day">livre</div>';
    } else {
      dayTasks.sort((a,b) => {
        const order = {urgent:0,high:1,normal:2};
        return (order[getPrio(parseInt(a.due_date))]||2)-(order[getPrio(parseInt(b.due_date))]||2);
      });
      for (const t of dayTasks) tasksEl.appendChild(buildTaskCard(t));
    }
  }

  for (const t of allTasks) if (isNew(t.date_created)) newT++;
  document.getElementById('st-total').textContent = totalWeek;
  document.getElementById('st-urgent').textContent = urgent;
  document.getElementById('st-high').textContent = high;
  document.getElementById('st-new').textContent = [...new Set(allTasks.filter(t=>isNew(t.date_created)).map(t=>t.id))].length;
  document.getElementById('st-nodate').textContent = nodate.length;

  const ndSection = document.getElementById('nodate-section');
  const ndTasks = document.getElementById('nodate-tasks');
  if (nodate.length) {
    ndSection.style.display = '';
    ndTasks.innerHTML = '';
    for (const t of nodate) ndTasks.appendChild(buildTaskCard(t));
  } else {
    ndSection.style.display = 'none';
  }
}

function showError(msg) {
  const bar = document.getElementById('error-bar');
  bar.textContent = msg;
  bar.style.display = msg ? 'block' : 'none';
}

async function syncData() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('loading');
  document.getElementById('sync-icon').innerHTML = '<span class="spin">↻</span>';
  showError('');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Você usa o ClickUp MCP. Token: ${TOKEN}. Team: ${TEAM_ID}.
Busque todas as tarefas em aberto do workspace. Filtre apenas as que têm assignees cujo username contenha "${DESIGNER_NAME}" (case insensitive).
Para cada tarefa retorne as subtarefas como itens independentes. Cada subtarefa deve ter: id, name, assignees, due_date (timestamp ms string ou null), date_created (timestamp ms string), list.name (da tarefa mãe), status (da tarefa mãe), parentName (nome da tarefa mãe), url.
Retorne SOMENTE JSON válido sem markdown:
{"items":[{"id":"","name":"","due_date":null,"date_created":"","list":"","status":"","parentName":"","url":"","isNew":false}]}
Se erro: {"items":[],"error":"mensagem"}`,
        messages: [{ role: 'user', content: `Busque subtarefas abertas atribuídas à ${DESIGNER_NAME} no workspace ${TEAM_ID}. Inclua subtarefas desacopladas das mães. Máximo 300 itens.` }],
        mcp_servers: [{ type: 'url', url: 'https://mcp.clickup.com/mcp', name: 'clickup' }]
      })
    });

    const data = await res.json();
    let raw = '';
    for (const b of (data.content||[])) {
      if (b.type==='text') raw += b.text;
      if (b.type==='mcp_tool_result' && b.content?.[0]?.text) raw += b.content[0].text;
    }

    let parsed;
    try {
      const m = raw.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
      parsed = m ? JSON.parse(m[0]) : null;
    } catch(e) { parsed = null; }

    if (!parsed || !parsed.items) {
      showError('Não foi possível interpretar a resposta. Verifique token e workspace.');
      return;
    }
    if (parsed.error) showError('Erro: ' + parsed.error);

    allTasks = parsed.items;
    render();

  } catch(e) {
    showError('Erro de conexão: ' + e.message);
  } finally {
    btn.classList.remove('loading');
    document.getElementById('sync-icon').textContent = '↻';
  }
}



function init() {
  document.getElementById('dashboard-area').style.display = '';
  render();
  syncData();
}

init();
</script>
</body>
</html>
